name: hosttestwebapi

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: hosttestwebapi
  AZURE_WEBAPP_PACKAGE_PATH: "./ApiCICDAzure/publish"
  DOTNET_VERSION: "9.X"
  SOLUTION_PATH: "ApiCICDAzure/ApiCICDAzure.slnx"
  API_PROJECT_PATH: "ApiCICDAzure/ApiCICDAzure.csproj"
  PUBLISH_DIR: "./publish"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }} 

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore --no-build --property:PublishDir=${{ env.PUBLISH_DIR }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: ${{ env.PUBLISH_DIR }}